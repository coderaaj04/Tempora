<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title> Tempora </title>

    <!-- Latest compiled and minified CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Latest compiled JavaScript -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

    <link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="32x32" href="favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="favicon-16x16.png">
    <link rel="icon" type="image/png" sizes="192x192" href="android-chrome-192x192.png">
    <link rel="icon" type="image/png" sizes="512x512" href="android-chrome-512x512.png">
    <link rel="manifest" href="site.webmanifest">

    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="container py-4">

        <!-- Header -->
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2>🌤 Weather</h2>

            <div>
                <button class="btn btn-success me-2" onclick="getLocation()">📍</button>
                <button class="btn btn-dark" id="themeBtn" onclick="toggleMode()">🌙</button>
            </div>
        </div>

        <!-- Search -->
        <div class="input-group mb-4">
            <input type="text" id="cityInput" class="form-control" placeholder="Search any city...">
            <button class="btn btn-primary" onclick="getWeather()">Search</button>
        </div>

        <!-- Loader -->
        <div id="loader" class="text-center d-none">
            <div class="spinner-border"></div>
        </div>

        <!-- Weather -->
        <div id="weatherBox" class="card p-4 d-none"></div>

        <!-- Forecast -->
        <div id="forecast" class="row mt-4"></div>

    </div>

    <script src="script.js"></script>
</body>

</html>
